name: hashed_image
description: >-
  A Flutter widget that shows network images with an animated BlurHash
  placeholder that dissolves away using a blob-decay animation once loaded.
version: 0.0.1
homepage: https://github.com/ObidjonJoraboyev/hashed_image
repository: https://github.com/ObidjonJoraboyev/hashed_image
issue_tracker: https://github.com/ObidjonJoraboyev/hashed_image/issues

environment:
  sdk: ^3.3.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  blurhash_dart: ^1.2.1
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
